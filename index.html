
    <title>忘遮茶馆·主页</title>
    <link rel="icon" type="image/x-icon" href="images/ic.svg"/>
  <style>
    /* 定义基础字体大小 */
    html {
      font-size: 16px;
    }
    body {
      background-color: black; /* 将网页背景设为黑色 */
    }
    .title {
      float: left;
    }
    .outer-border {
      border: 1px solid;
      padding: 0.3125rem;
      font-size: 0.75rem;
      background-color: white;/* 将网页控制台设为白色 */
      border-radius: 0.375rem;
    }
    .inner-border {
      border: 1px solid;
      margin: 1.4375rem 0.0625rem 0.0625rem 0.0625rem;
      font-size: 0.9375rem;
      background-color: black;/* 将网页控制台设为黑色 */
      color: #ccc;
      white-space: pre-wrap; /* 保留换行符 */
    }
  </style>
</head>
<body>
  <div class="outer-border">
    <div class="title">
      <img src="images/favicon.png">
    </div>
    <div class="title">
      Cosmos: 忘遮茶馆:\银河系\编外行星\卢比孔.分部
    </div>
    <div class="inner-border" id="typing-effect">
      <!-- 原有的文本内容 -->
      忘遮茶馆 分部 [Version 2023.8.7]
      Copyleft (c) 2000 objet petit a. All lefts reserved.
      望遮茶馆:\\千高原\\阿尔卡迪亚田园>
    </div>
  </div>

  <script>
    // 要显示的文本
    const textToType = `忘遮茶馆 分部 [Version 2023.8.7]
Copyleft (c) 2000 Objet petit a. All lefts reserved.
望遮茶馆:\\千高原\\阿尔卡迪亚田园>`;

    // 获取显示打字机效果的元素
    const typingEffectElement = document.getElementById('typing-effect');

    // 设置初始文本为空
    typingEffectElement.textContent = '';

    // 定义打字机效果的速度（每个字符的间隔时间，单位：毫秒）
    const typingSpeed = 100;

    // 定义一个计数器，用于追踪当前应该显示的字符的位置
    let charIndex = 0;

    // 定义一个函数来模拟打字机效果
    function typeText() {
      if (charIndex < textToType.length) {
        // 获取当前要显示的字符
        const currentChar = textToType[charIndex];
        
        // 将当前字符追加到显示元素中
        typingEffectElement.textContent += currentChar;
        
        // 增加计数器，指向下一个要显示的字符
        charIndex++;
        
        // 递归调用 typeText 函数，以模拟打字机效果
        setTimeout(typeText, typingSpeed);
      }
    }

    // 开始打字机效果
    typeText();
  </script>
</body>
</html>
